spring.datasource.url=jdbc:postgresql://localhost:5432/rss_reader
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

hibernate.hbm2ddl.auto=none
hibernate.show_sql=false
hibernate.format_sql=false

github.client-id=YOUR_GITHUB_CLIENT_ID
github.client-secret=YOUR_GITHUB_CLIENT_SECRET
github.redirect-uri=http://localhost:8080/login/oauth2/code/github

google.client-id=YOUR_GOOGLE_CLIENT_ID
google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
google.redirect-uri=http://localhost:8080/login/oauth2/code/google