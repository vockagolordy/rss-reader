<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
    <title th:text="${post.title} ?: 'Post Details'">Post Details - RSS Reader</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <h1 class="card-title" th:text="${post.title} ?: 'No title'">Post Title</h1>
                    <p class="card-text" th:text="${post.description} ?: 'No description'">Post description...</p>
                    <hr>
                    <div class="mt-3">
                        <a th:href="${post.link}" target="_blank" class="btn btn-primary">Read Original</a>
                        <a href="/posts" class="btn btn-secondary">Back to Feed</a>
                    </div>
                    <div class="mt-3 text-muted">
                        <small>Source: <span th:text="${post.resourceTitle}">Source Name</span></small><br>
                        <small>Published: <span th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd HH:mm')}">Date</span></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
