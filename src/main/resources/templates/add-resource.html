<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
    <title>Add RSS Source - RSS Reader</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3>Add New RSS Source</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/resources}" th:object="${resource}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title"
                                   th:field="*{title}" required>
                            <div th:if="${#fields.hasErrors('title')}"
                                 class="text-danger" th:errors="*{title}"></div>
                            <small class="form-text text-muted">
                                Give your RSS source a descriptive name
                            </small>
                        </div>

                        <div class="mb-3">
                            <label for="link" class="form-label">RSS URL</label>
                            <input type="url" class="form-control" id="link"
                                   th:field="*{link}" required>
                            <div th:if="${#fields.hasErrors('link')}"
                                 class="text-danger" th:errors="*{link}"></div>
                            <small class="form-text text-muted">
                                Example: https://habr.com/ru/rss/articles/top/daily/?fl=ru
                            </small>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary">Add Source</button>
                            <a href="/resources" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
